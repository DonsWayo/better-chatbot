{{- if .Values.worker.enabled -}}
# Detached agent-platform worker (Agent Platform #22). Claims due workflow_schedule rows and
# queued/stale agent_session rows with FOR UPDATE SKIP LOCKED and executes workflows out-of-band
# of web requests. Same image and env as the app; no Service — it serves no traffic. Uses its own
# selector labels (component suffix on the name) so the app Service NEVER routes to worker pods.
# NOTE: the production runner image is the Next standalone output (no pnpm/tsx), so
# .Values.worker.command must point at an entrypoint bundled into the image — mirror the
# scripts/standalone-migrate.mjs esbuild pattern in docker/Dockerfile for scripts/agent-worker.ts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asafe-ai.fullname" . }}-worker
  labels:
    {{- include "asafe-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "asafe-ai.name" . }}-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "asafe-ai.name" . }}-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "asafe-ai.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: worker
          image: {{ include "asafe-ai.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "asafe-ai.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            - name: APP_VERSION
              value: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
{{- end }}
