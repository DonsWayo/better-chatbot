apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "asafe-ai.fullname" . }}-config
  labels:
    {{- include "asafe-ai.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- if and .Values.electric.enabled (not (hasKey .Values.config "ELECTRIC_URL")) }}
  # Internal Electric sync service for the authenticated shape proxy (/api/realtime/shape).
  ELECTRIC_URL: {{ printf "http://%s-electric:%d" (include "asafe-ai.fullname" .) (int .Values.electric.service.port) | quote }}
  {{- end }}
