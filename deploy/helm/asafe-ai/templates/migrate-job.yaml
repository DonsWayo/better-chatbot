{{- if .Values.migrateJob.enabled -}}
# Runs DB migrations ONCE per release as a pre-install/pre-upgrade hook (ADR-0006), so the
# Deployment replicas don't race (they run with DISABLE_DB_MIGRATE_ON_BOOT=true). Only needs
# POSTGRES_URL, which lives in the externally-managed Secret (exists independently of Helm, so
# it's available even during the pre-install hook phase).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "asafe-ai.fullname" . }}-migrate
  labels:
    {{- include "asafe-ai.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrateJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "asafe-ai.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "asafe-ai.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: migrate
          image: {{ include "asafe-ai.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "scripts/standalone-migrate.cjs"]
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
{{- end }}
