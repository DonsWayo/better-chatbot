apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: asafe-ai-secrets
  namespace: asafe-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: asafe-ai-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_URL
      remoteRef: { key: conek-dev/development/asafe-ai-secrets, property: POSTGRES_URL }
    - secretKey: BETTER_AUTH_SECRET
      remoteRef: { key: conek-dev/development/asafe-ai-secrets, property: BETTER_AUTH_SECRET }
    - secretKey: OPENROUTER_API_KEY
      remoteRef: { key: conek-dev/development/asafe-ai-secrets, property: OPENROUTER_API_KEY }
    - secretKey: BRAVE_API_KEY
      remoteRef: { key: conek-dev/development/asafe-ai-secrets, property: BRAVE_API_KEY }
    - secretKey: MICROSOFT_CLIENT_ID
      remoteRef: { key: conek-dev/development/application-secrets, property: entra_id_client_id }
    - secretKey: MICROSOFT_CLIENT_SECRET
      remoteRef: { key: conek-dev/development/application-secrets, property: entra_id_client_secret }
    - secretKey: MICROSOFT_TENANT_ID
      remoteRef: { key: conek-dev/development/application-secrets, property: entra_id_tenant_id }
