# Example ExternalSecret (External Secrets Operator) that materializes the `asafe-ai-secrets`
# Secret from AWS Secrets Manager (ADR-0006). Apply this BEFORE `helm install` so the Secret
# exists when the migration hook Job runs. Requires a configured (Cluster)SecretStore.
#
# Adjust apiVersion to your ESO version (external-secrets.io/v1 or v1beta1), the store name,
# and the remoteRef keys/properties to match how secrets are stored in AWS Secrets Manager.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: asafe-ai-secrets
  namespace: asafe-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager # ClusterSecretStore/SecretStore name — set by IT
    kind: ClusterSecretStore
  target:
    name: asafe-ai-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_URL
      remoteRef: { key: asafe-ai/prod, property: POSTGRES_URL }
    - secretKey: BETTER_AUTH_SECRET
      remoteRef: { key: asafe-ai/prod, property: BETTER_AUTH_SECRET }
    - secretKey: OPENROUTER_API_KEY
      remoteRef: { key: asafe-ai/prod, property: OPENROUTER_API_KEY }
    - secretKey: REDIS_URL
      remoteRef: { key: asafe-ai/prod, property: REDIS_URL }
    # Microsoft Entra ID SSO (ADR-0005)
    - secretKey: MICROSOFT_CLIENT_ID
      remoteRef: { key: asafe-ai/prod, property: MICROSOFT_CLIENT_ID }
    - secretKey: MICROSOFT_CLIENT_SECRET
      remoteRef: { key: asafe-ai/prod, property: MICROSOFT_CLIENT_SECRET }
    # Optional
    - secretKey: SENTRY_DSN
      remoteRef: { key: asafe-ai/prod, property: SENTRY_DSN }
    - secretKey: METRICS_AUTH_TOKEN
      remoteRef: { key: asafe-ai/prod, property: METRICS_AUTH_TOKEN }
