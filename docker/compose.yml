services:
  better-chatbot:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NO_HTTPS=1
    env_file:
      - .env
    dns:
      - 8.8.8.8 # Google's public DNS server
      - 8.8.4.4 # Google's public DNS server
    networks:
      - better-chatbot-networks
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    # AI-native Postgres: the TimescaleDB HA image bundles pgvector + pgvectorscale + timescaledb
    # (+ postgis, pgai). Extensions are enabled by docker/initdb/01-extensions.sql on first init.
    # Prod DB must also provide pgvector (RDS/Aurora ok); timescale needs Timescale Cloud / EKS
    # (ADR-0006).
    image: timescale/timescaledb-ha:pg17
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - better-chatbot-networks
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  better-chatbot-networks:
    driver: bridge
