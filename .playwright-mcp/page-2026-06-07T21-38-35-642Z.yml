      - heading "Puestos de trabajo más seguros y avanzados" [level=2] [ref=e98]
      - generic [ref=e99]:
        - generic [ref=e100]:
          - img "Barreras de seguridad industrial para proteger a las personas en un pasillo" [ref=e101]
          - heading "Proteger personas" [level=3] [ref=e102]
          - paragraph [ref=e103]: Mantén a las personas seguras, reduce el riesgo e impulsa la eficiencia con barreras de resistencia industrial que flexionan tras el impacto, absorben la energía del vehículo y luego se recuperan totalmente para una protección continua.
        - generic [ref=e104]:
          - img "Barreras de seguridad de polímero que amortiguan los golpes de las carretillas elevadoras" [ref=e105]
          - heading "Reducir costes operativos" [level=3] [ref=e106]
          - paragraph [ref=e107]: Reduce costes de mantenimiento, reparaciones, reemplazos y tiempos de inactividad con barreras avanzadas que no se corroen, oxidan o decoloran, no requieren repintado y se recuperan después del impacto.
        - generic [ref=e108]:
          - img "Barreras de seguridad industrial sometidas a pruebas según BSI PAS13 y la NTP 1178" [ref=e109]
          - heading "Cumplimiento de seguridad" [level=3] [ref=e110]
          - paragraph [ref=e111]: Elige barreras de seguridad que están rigurosamente probadas y certificadas de forma independiente según estándares globales reconocidos para asegurarte su rendimiento cuando más se necesita.
